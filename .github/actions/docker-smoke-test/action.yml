name: 'Docker Smoke Test'
description: 'Standardized smoke testing of containers using docker-compose'
inputs:
  compose_file:
    description: 'Path to docker-compose.yml'
    required: true
  profile:
    description: 'Docker Compose profile to use'
    required: false
    default: ''
  attach_services:
    description: 'Comma-separated list of services to attach logs from'
    required: false
    default: ''
  exclusions:
    description: 'List of log messages (one per line) to exclude from ERROR|WARN check'
    required: false
    default: ''

runs:
  using: "composite"
  steps:
    - name: Run Smoke Test Script
      shell: bash
      run: |
        ${{ github.action_path }}/../../scripts/smoke-test.sh \
          "${{ inputs.compose_file }}" \
          "${{ inputs.profile }}" \
          "${{ inputs.attach_services }}" \
          "${{ inputs.exclusions }}"

    - name: Cleanup
      if: always()
      shell: bash
      run: |
        docker compose -f ${{ inputs.compose_file }} down -v || true
