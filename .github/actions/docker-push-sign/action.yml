name: Docker Push and Sign
description: Tags, pushes, and signs Docker images with multiple tags.

inputs:
  local_image:
    description: Name of the local image to push
    required: true
  remote_image:
    description: Full name of the remote image (including registry)
    required: false
  registry:
    description: Registry hostname
    required: false
    default: w90vyjm8.c1.bhs5.container-registry.ovh.net
  registry_path:
    description: Registry path/project
    required: false
    default: cv.coderbunker.ca
  image_name:
    description: Name of the image (without registry or path)
    required: false
  version:
    description: Version tag to use
    required: true
  tag_suffix:
    description: Optional suffix for tags (e.g. -worker)
    required: false
    default: ""
  push_latest:
    description: Whether to push 'latest' tag (only on main branch releases)
    required: false
    default: "false"
  is_new_release:
    description: Whether this is a new published release
    required: false
    default: "false"

outputs:
  primary_tag:
    description: "The primary environment-specific tag (e.g. 1.2.3-rc-build-42)"
    value: ${{ steps.meta.outputs.primary_tag }}

runs:
  using: composite
  steps:
    - name: Check OIDC Token Availability
      shell: bash
      run: |
        if [ -z "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
          echo "Error: OIDC token generation is not available."
          echo "Please ensure the workflow has 'permissions: id-token: write'."
          exit 1
        fi

    - name: Generate Tags
      id: meta
      uses: coderbunker/modern-resume-env/.github/actions/docker-tag-generator@develop
      with:
        new_release_version: ${{ inputs.version }}
        is_new_release: ${{ inputs.is_new_release }}

    - name: Push and Sign
      shell: bash
      env:
        REGISTRY: ${{ inputs.registry }}
        REGISTRY_PATH: ${{ inputs.registry_path }}
        IMAGE_NAME_INPUT: ${{ inputs.image_name }}
        REMOTE_IMAGE_FULL: ${{ inputs.remote_image }}
        LOCAL_IMAGE: ${{ inputs.local_image }}
        TAG_SUFFIX: ${{ inputs.tag_suffix }}
        TAGS: ${{ steps.meta.outputs.tags }}
        COSIGN_YES: "true"
      run: |
        # Construct full image name if not explicitly provided
        if [ -n "$REMOTE_IMAGE_FULL" ]; then
          IMAGE_NAME="$REMOTE_IMAGE_FULL"
        else
          IMAGE_NAME="${REGISTRY}/${REGISTRY_PATH}/${IMAGE_NAME_INPUT}"
        fi

        echo "Using image name: $IMAGE_NAME"
        # The generator returns tags in format: type=raw,value=TAG
        # We need to extract just the TAG values
        CLEAN_TAGS=$(echo -e "$TAGS" | grep "type=raw,value=" | cut -d '=' -f 3)

        for TAG in $CLEAN_TAGS; do
          FULL_IMAGE="${IMAGE_NAME}:${TAG}${TAG_SUFFIX}"
          echo "Processing tag: $FULL_IMAGE"
          docker tag "$LOCAL_IMAGE" "$FULL_IMAGE"
          docker push "$FULL_IMAGE"
          cosign sign "$FULL_IMAGE"
        done
