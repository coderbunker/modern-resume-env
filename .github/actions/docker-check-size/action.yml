name: Docker Check Image Size
description: Compares local image size with remote registry image size and reports significant increases.

inputs:
  remote_image:
    description: Full name of the remote image (including registry)
    required: false
  registry:
    description: Registry hostname
    required: false
    default: w90vyjm8.c1.bhs5.container-registry.ovh.net
  registry_path:
    description: Registry path/project
    required: false
    default: cv.coderbunker.ca
  image_name:
    description: Name of the image (without registry or path)
    required: false
  local_image:
    description: Name of the local image to compare
    required: true
  threshold:
    description: Percentage increase threshold for warning (default 10)
    required: false
    default: "10"
  github_token:
    description: GitHub token for posting PR comments
    required: false
  pr_number:
    description: Pull request number for commenting
    required: false

outputs:
  size_warning:
    description: Whether a significant size increase was detected ("true" or "false")
    value: ${{ steps.check.outputs.size_warning }}

runs:
  using: composite
  steps:
    - name: Run Size Check
      id: check
      shell: bash
      env:
        REGISTRY: ${{ inputs.registry }}
        REGISTRY_PATH: ${{ inputs.registry_path }}
        IMAGE_NAME_INPUT: ${{ inputs.image_name }}
        REMOTE_IMAGE_FULL: ${{ inputs.remote_image }}
        LOCAL_IMAGE_NAME: ${{ inputs.local_image }}
        FAIL_THRESHOLD_PERCENT: ${{ inputs.threshold }}
      run: |
        # Construct full image name if not explicitly provided
        if [ -n "$REMOTE_IMAGE_FULL" ]; then
          REMOTE_IMAGE_NAME="$REMOTE_IMAGE_FULL"
        else
          REMOTE_IMAGE_NAME="${REGISTRY}/${REGISTRY_PATH}/${IMAGE_NAME_INPUT}"
        fi

        export REMOTE_IMAGE_NAME
        ${{ github.action_path }}/../../scripts/docker-check-size.sh

    - name: Report Size Increase to PR
      if: |
        steps.check.outputs.size_warning == 'true' &&
        inputs.github_token != '' &&
        inputs.pr_number != ''
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        gh pr comment ${{ inputs.pr_number }} \
          --body-file image-size-report.md
