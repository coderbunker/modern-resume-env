name: Docker Tag Generator
description: Generates standardized Docker tags based on the tagging policy.

inputs:
  new_release_version:
    description: "Semantic version determined by semantic-release"
    required: false
  is_new_release:
    description: "Whether a new release was published"
    required: false
    default: "false"

outputs:
  tags:
    description: "Generated tags for docker/metadata-action"
    value: ${{ steps.gen.outputs.tags }}
  primary_tag:
    description: "The primary environment-specific tag (e.g. 1.2.3-rc-build-42)"
    value: ${{ steps.gen.outputs.primary_tag }}

runs:
  using: "composite"
  steps:
    - name: Generate Tags
      id: gen
      shell: bash
      run: |
        VERSION="${{ inputs.new_release_version }}"
        # Fallback if version is missing
        if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
          VERSION=$(grep '"version":' package.json | cut -d '"' -f 4 || echo "0.0.0")
        fi

        TAGS=""
        PRIMARY_TAG=""
        RUN_ID="${{ github.run_number }}"

        # 1. Pull Request (Dev)
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          PR_NUM="${{ github.event.pull_request.number }}"
          PRIMARY_TAG="${VERSION}-pr-${PR_NUM}-build-${RUN_ID}"
          TAGS="type=raw,value=${PRIMARY_TAG}\n$TAGS"
        fi

        # 2. Release Candidate (Staging - from develop branch)
        if [[ "${{ github.ref_name }}" == "develop" && "${{ github.event_name }}" != "pull_request" ]]; then
          PRIMARY_TAG="${VERSION}-rc-build-${RUN_ID}"
          TAGS="type=raw,value=${PRIMARY_TAG}\n$TAGS"
          TAGS="type=raw,value=latest-staging\n$TAGS"
        fi

        # 3. Production Release (from main branch)
        if [[ "${{ github.ref_name }}" == "main" && "${{ inputs.is_new_release }}" == "true" ]]; then
          PRIMARY_TAG="${VERSION}-build-${RUN_ID}"
          TAGS="type=raw,value=${PRIMARY_TAG}\n$TAGS"
          TAGS="type=raw,value=${VERSION}\n$TAGS"
          TAGS="type=raw,value=latest-prod\n$TAGS"
        fi

        # 4. Standard Metadata Tags (Always)
        SHORT_SHA=$(git rev-parse --short HEAD)
        TAGS="type=raw,value=sha-${SHORT_SHA}\n$TAGS"
        TAGS="type=raw,value=build-${RUN_ID}\n$TAGS"

        # If no primary tag was set (e.g. ad-hoc branch), use the build-ID
        if [[ -z "$PRIMARY_TAG" ]]; then
          PRIMARY_TAG="build-${RUN_ID}"
        fi

        # Output tags
        echo "Final tags for metadata-action:"
        echo -e "$TAGS"
        echo "Primary tag: $PRIMARY_TAG"

        echo "tags<<EOF" >> "$GITHUB_OUTPUT"
        echo -e "$TAGS" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"
        echo "primary_tag=$PRIMARY_TAG" >> "$GITHUB_OUTPUT"
